<svg xmlns="http://www.w3.org/2000/svg" width="240" height="320" viewBox="0 0 240 320" role="img" aria-label="Hackathon stats card">
  <!-- Stacked blocks, transparent background -->

  <defs>
    <linearGradient id="gradOrganised" x1="1" x2="0">
      <stop offset="0%" stop-color="#2e8b57" />
      <stop offset="30%" stop-color="#4b6ea0" />
      <stop offset="60%" stop-color="#7a3dbb" />
      <stop offset="100%" stop-color="#6a0dad" />
    </linearGradient>
    <linearGradient id="gradVolunteered" x1="1" x2="0">
      <stop offset="0%" stop-color="#0b3d91" />
      <stop offset="30%" stop-color="#4b6ea0" />
      <stop offset="60%" stop-color="#7a3dbb" />
      <stop offset="85%" stop-color="#6a0dad" />
      <stop offset="100%" stop-color="#6a0dad" />
    </linearGradient>
    <linearGradient id="gradMLH" x1="1" x2="0">
      <stop offset="0%" stop-color="#0b3d91" />
      <stop offset="25%" stop-color="#0b3d91" />
      <stop offset="35%" stop-color="#9ec7f0" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>
  </defs>

  <!-- Hackathons (purple) -->
  <rect x="0" y="0" width="240" height="64" rx="6" fill="#6a0dad" />
  <text x="16" y="32" fill="#ffffff" font-size="18" font-family="Inter, Arial, sans-serif" font-weight="700" dominant-baseline="middle">Hackathons</text>
  <text id="total" x="216" y="32" text-anchor="end" font-weight="700" fill="#ffffff" font-size="20" font-family="Inter, Arial, sans-serif" dominant-baseline="middle">30</text>

  <!-- MLH Events (white block) -->
  <rect x="0" y="64" width="240" height="64" rx="6" fill="url(#gradMLH)" />
  <text x="16" y="96" fill="#111111" font-size="18" font-family="Inter, Arial, sans-serif" dominant-baseline="middle">
    <tspan fill="#8b0000" font-weight="700">M</tspan><tspan fill="#00008b" font-weight="700">L</tspan><tspan fill="#b8860b" font-weight="700">H</tspan>
    <tspan fill="#111111" font-weight="600"> Events</tspan>
  </text>
  <text id="mlh" x="216" y="96" text-anchor="end" font-weight="700" fill="#ffffff" font-size="20" font-family="Inter, Arial, sans-serif" dominant-baseline="middle">10</text>

  <!-- HUK (hot pink) -->
  <rect x="0" y="128" width="240" height="64" rx="6" fill="#ff1493" />
  <text x="16" y="160" fill="#ffffff" font-size="18" font-family="Inter, Arial, sans-serif" font-weight="700" dominant-baseline="middle">HUK Events</text>
  <text id="huk" x="216" y="160" text-anchor="end" font-weight="700" fill="#ffffff" font-size="20" font-family="Inter, Arial, sans-serif" dominant-baseline="middle">5</text>

  <!-- Organised (purple with green from right) -->
  <rect x="0" y="192" width="240" height="64" rx="6" fill="url(#gradOrganised)" />
  <text x="16" y="224" fill="#ffffff" font-size="18" font-family="Inter, Arial, sans-serif" font-weight="700" dominant-baseline="middle">Organised</text>
  <text id="organised" x="216" y="224" text-anchor="end" font-weight="700" fill="#ffffff" font-size="20" font-family="Inter, Arial, sans-serif" dominant-baseline="middle">3</text>

  <!-- Volunteered (purple with dark blue from right) -->
  <rect x="0" y="256" width="240" height="64" rx="6" fill="url(#gradVolunteered)" />
  <text x="16" y="288" fill="#ffffff" font-size="18" font-family="Inter, Arial, sans-serif" font-weight="700" dominant-baseline="middle">Volunteered</text>
  <text id="volunteered" x="216" y="288" text-anchor="end" font-weight="700" fill="#ffffff" font-size="20" font-family="Inter, Arial, sans-serif" dominant-baseline="middle">4</text>

</svg>
